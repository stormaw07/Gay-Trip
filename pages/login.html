<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trip Memories – Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://use.typekit.net/chw7yga.css">
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2L16 11l3.5-3.5C21 6 21 4 19 2c-2-2-4-2-5.5-.5L10 5 1.8 6.2a1 1 0 0 0-.5 1.7l2.5 2.5L2.3 13a1 1 0 0 0 .3 1l7.4 7.4a1 1 0 0 0 1-.3l2.6-1.5 2.5 2.5a1 1 0 0 0 1.7-.5z"/></svg>
    </div>
    <h1>Trip Memories</h1>
    <p class="login-subtitle">Sign in to view your adventures</p>

    <div id="error-msg" class="error-msg hidden"></div>

    <button id="google-btn" class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>

    <p class="login-note">Only invited friends can access this site.</p>
  </div>

  <script type="module">
    import { auth } from '../js/firebase.js';
    import {
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    import { ALLOWED_EMAILS } from '../js/firebase.js';

    onAuthStateChanged(auth, (user) => {
      if (user && ALLOWED_EMAILS.includes(user.email)) {
        window.location.href = 'dashboard.html';
      }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        const email = result.user.email;
        if (!ALLOWED_EMAILS.includes(email)) {
          await auth.signOut();
          showError("Sorry, your account isn't on the invite list.");
        }
      } catch (err) {
        showError("Sign in failed. Please try again.");
        console.error(err);
      }
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
